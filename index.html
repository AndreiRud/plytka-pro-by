      }
      .calc-cta:hover { opacity: 0.9; }
      .calc-note { font-size: 12px; color: #6b7280; text-align: center; margin-top: 12px; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      // ============================================================
      // КАЛЬКУЛЯТОР СТОИМОСТИ РАБОТ
      // ------------------------------------------------------------
      // Скрипт работает с DOM, который рендерит React-компонент
      // <PriceCalculator />. Все данные (цена, единица, название)
      // берутся из data-атрибутов на элементах .calc-row.
      // ============================================================
      document.addEventListener("DOMContentLoaded", function () {

        // React монтирует контент асинхронно — ждём появления #calc-root
        function initCalc() {
          var el = document.getElementById("calc-root");
          if (!el) {
            setTimeout(initCalc, 200);
            return;
          }

          // Кэшируем ключевые элементы калькулятора
          var inputs = el.querySelectorAll(".calc-qty");          // поля количества
          var list   = el.querySelector(".calc-summary-list");    // список выбранных позиций (смета)
          var empty  = el.querySelector(".calc-summary-empty");   // подсказка «добавьте позиции»
          var total  = el.querySelector(".calc-total-value");     // итоговая сумма

          // --- Раскрытие/сворачивание блока «Что входит» ---
          el.querySelectorAll(".calc-toggle").forEach(function (btn) {
            btn.addEventListener("click", function () {
              var details = btn.closest(".calc-row").querySelector(".calc-details");
              var isOpen = details.style.display !== "none";
              details.style.display = isOpen ? "none" : "block";
              btn.textContent = isOpen ? "Что входит ▼" : "Свернуть ▲";
            });
          });

          // --- Пересчёт сметы и итоговой суммы ---
          function update() {
            var sum = 0;
            var html = "";

            inputs.forEach(function (inp) {
              var qty = parseInt(inp.value) || 0;
              var row = inp.closest(".calc-row");

              // Данные позиции читаем из data-атрибутов на .calc-row
              var price = parseFloat(row.dataset.price);
              var unit  = row.dataset.unit;
              var name  = row.dataset.name;

              if (qty > 0) {
                var lineTotal = qty * price;
                sum += lineTotal;
                html +=
                  '<div class="calc-summary-row">' +
                    '<span class="calc-summary-name">' + name + "</span>" +
                    '<span class="calc-summary-val">' +
                      qty + " " + unit + " × " + price + " = " + lineTotal + " р." +
                    "</span>" +
                  "</div>";
                row.classList.add("selected");
              } else {
                row.classList.remove("selected");
              }
            });

            // Обновляем смету и подсказку «пусто»
            list.innerHTML = html;
            list.style.display = html ? "" : "none";
            empty.style.display = html ? "none" : "";
            total.textContent = sum + " бел. руб.";
          }

          // --- Кнопка «минус»: уменьшает количество, не ниже 0 ---
          el.querySelectorAll(".calc-btn-minus").forEach(function (btn) {
            btn.addEventListener("click", function () {
              var inp = btn.parentElement.querySelector("input");
              inp.value = Math.max(0, (parseInt(inp.value) || 0) - 1);
              update();
            });
          });

          // --- Кнопка «плюс»: увеличивает количество ---
          el.querySelectorAll(".calc-btn-plus").forEach(function (btn) {
            btn.addEventListener("click", function () {
              var inp = btn.parentElement.querySelector("input");
              inp.value = (parseInt(inp.value) || 0) + 1;
              update();
            });
          });

          // --- Ручной ввод количества с клавиатуры ---
          inputs.forEach(function (inp) {
            inp.addEventListener("input", update);
          });

          // Первичный пересчёт (на случай ненулевых значений по умолчанию)
          update();
        }

        initCalc();
      });
    </script>
  </body>
</html>
